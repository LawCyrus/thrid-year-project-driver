<!DOCTYPE html>
<html>
  <!-- This is a webpage for simple NFC interactions, including read, write, and resetting a NFC tag-->
<head>
  <!-- A seperate CSS section to custoimize the UI of each buttons and the webpage layout-->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <!--make sure webpage can actually fit in different screen size-->
  <title>Web NFC editor</title>
  <style>
    :root /* Reusable global variables for consistent UI design */
    {
      --bg: #f4f6fc;
      --surface: #ffffff;
      --text: #1e2740;
      --logtext: #5b6b86;
      --primary: #2b56a1;
      --accent: #f4a261;
      --border: #d6dfee;
    }

    * 
    {
      box-sizing: border-box; /* make sures the height/width includes padding and border px */
    }

    body /* Overall page UI setting */
    {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif, Roboto, Arial;
      line-height: 1.5;
      min-height: 100vh;
      padding: 24px 12px;
    }

    .container /* set max width for container and make it center aligned*/
    {
      max-width: 1040px;
      margin: 0 auto;
      padding: 20px;
    }

    .menu-group,
    .controls /*UI setting for button groups and top down menu */
    {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(20, 34, 55, 0.08); /*added shadow to container to stop the buttons blending in the webpage*/
      padding: 18px;
      margin-bottom: 20px;
    }

    h1 /* title Ui setting, make title more responisve to various screen size using clamp() */
    {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 900;
    }

    button,select,input /* consistent font across buttons, inputs, and select mode*/
    {
      font: inherit;
    }

    button /*UI setting for the individual buttons*/
    {
      background: var(--primary);
      color: #fff;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0.55rem 0.95rem;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
      margin: 0 0.35rem 0.35rem 0;
    }

    button:hover /* change the button UI to the following setting when mouse hover over the butotn*/
    {
      transform: translateY(-1px);
      background: #1f4f8a;
    }

    #log /* log section UI setting*/
    {
      white-space: pre-wrap;
      font-family: ui-monospace, monospace;
      color: var(--logtext);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      min-height: 92px;
      background: #fdfdff;
      margin-top: 10px;
    }

    #ledGrid 
    {
      display: grid;
      grid-template-columns: repeat(5, 30px);
      gap: 5px;
      margin-bottom: 10px;
    }

    #ledGrid > div 
    {
      width: 30px;
      height: 30px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    label,
    p,
    select,
    input 
    {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!--here is where the top down menu will be located at. The top down menu allows user to select what operation they are about to be, then using the r/w
    button to confirm what they are doing -->

    <!-- needs it to make sure white space padding is showing properly-->
    <h1>Web NFC editor</h1>
    <div class="controls">
      <button id="scanButton">Scan Card</button>
      <button id="writeButton">Write Card</button>
      <button id="resetButton">Reset Card</button>
    </div>

    <div class="menu-group">
    <button id="writeMenuButton">Write Options ▾</button>
    <div id="writeSubmenu" style="display: none; border: 1px solid hsl(0, 0%, 80%); padding: 10px; margin-top: 5px; background: #f9f9f9;">

      <!-- Mode selection on write functions-->
      <p><strong>Select Mode:</strong></p>
      <button id="appendButton">Add New Record</button>
      <button id="overwriteButton">Overwrite by ID</button>
      <br><br>
      <div id="idTargetSection" style="display: none;">
        <label>ID to Target:</label>
        <input type="text" id="targetID" value="String1">
      </div>

      <!-- Area for user to input their own string-->
      <p><strong>Custom Input:</strong></p>
      <input type="text" id="userInput" placeholder="Enter text here:" maxlength="25">
      <br><br>

      <!-- Area for user to add in LED image of their choice-->
       <hr><p><strong>Custom LED Grid:</p></strong></p>
       <div id="ledGrid" style="display: grid; grid-template-columns: repeat(5, 30px); gap: 5px; margin-bottom:10px;">
       </div>
       <button id="writeCustomLED">Write LED Image</button>


      <!--a microbit led preset to test the microbit LED interactions-->
      <hr><p><strong>micro:bit LED Presets:</strong></p>
      <select id = "presetList">
        <option value = "0101011111111110111000100">Heart</option>
        <option value="1111110001100011000111111">Square</option>
        <option value="0000001010000001000101110">Smile</option>
      </select>
      <button id="writePresetButton">Preset Append</button>
    </div>
    <!-- <button id="readMenuButton">Read Options ▾</button>
    <button id="resetMenuButton">Reset Options ▾</button> -->
    <!-- The read and reset options are not implemented yet, but the buttons are there for future development. -->
  </div>
    <p id="log"></p>
  </div>
</body>

<script>
    const FIXED_BLOCK_SIZE = 25; //minusing the NDEF header, only have 25 bytes of data remaining if wanting to do 32 bytes data block
    let nfcController = null; //global controller to ensure only 1 function is running at the same time

    const gridContainer = document.getElementById('ledGrid'); //creates a 5x5 Grid UI for user to input
    for (let i =0; i < 25; i++)
    {
      const led = document.createElement('div');
      led.style.width = '30px';
      led.style.height = '30px';
      led.style.border = '1px solid #ccc';
      led.style.backgroundColor = '#fff';
      led.style.cursor = 'pointer';
      led.dataset.state = "0";

      led.onclick = () => //wait until click, then setup the code
      {
        if (led.dataset.state === "0") //if the current clicked led is not set to on
        {
          led.style.backgroundColor = 'red';
          led.dataset.state = "1";
        }else //set that led to 0(off)
        {
          led.style.backgroundColor = '#fff';
          led.dataset.state = "0";
        }
      };
      gridContainer.appendChild(led);
    }

    function getGridString()
    {
      return Array.from(gridContainer.children).map(led => led.dataset.state).join('');
    }

    const log = (msg) => document.getElementById('log').innerText += msg + '\n'; 

    function stopExisitingScan() //fucntion to ensure all functions is killed before new function is running
    {
      if (nfcController) 
      {
        nfcController.abort();
        log("Stop previous operation");
      }

      nfcController = new AbortController()
    }

    function FixedSizeformat(text) 
    {
      if (text.length > FIXED_BLOCK_SIZE)
      {
        // Trim if too long
        return text.substring(0, FIXED_BLOCK_SIZE);
      }
    // Pad with spaces if too short
    return text.padEnd(FIXED_BLOCK_SIZE, " "); 
    }

    async function performWipe(reader) 
    {
      let n = 9;
      while (n > 0)
      {
        try
        {
          const wipeContent = "CLEAN".padEnd(Math.pow(2,n), " ");
          await reader.write(
          {
            records: [
            {
              recordType: "text",
              data: wipeContent,
              id: "STRING1"
            }]
          });
          log(`Successfully wiped ${2^n} bytes.`);
          return true;
        }catch (e)
        {
          n--;
          if (e.name === "QuotaExceededError") //too large == quotaerror
          {
            log(`${2^n} bytes is too large for this tag.`);
          }else //not size error, need to know why
          {
            throw e;
          }
        }
      }
      log (`error on reseting the NFC tag`);
      nfcController.abort();
    }

    // Writing Function, responsible for modifying data inside the tag
    // Current version - v3: overwrite specific data type
    // v4 plan: allow user to overwrite data (String) using webnfc interface instead of static code
    async function NFCWrite(mode, customPattern = null) //customPattern = null to make the custompattern parameter optional
    {
      stopExisitingScan();
      const targetID = document.getElementById('targetID').value;
      const customText = document.getElementById('userInput').value;

      const select = document.getElementById('presetList');
      //const pattern = select.value; //microbit 25 bit length on LED on or off
      const label = select.options[select.selectedIndex].text;  //name of preset

      const finalPattern = customPattern || select.value;

      try 
      {
        const NDEF = new NDEFReader(); // instance of nedf to record exisitn data
        log (`Mode: ${mode}, Ready to write.`);
        await NDEF.scan({signal: nfcController.signal});

        NDEF.onreading = async ({message}) => //only message matters, async for full read complete
        {
          try
          {
            let records = message.records.map(record => (
            {
              recordType: record.recordType,
              data: record.data,
              id: record.id, //important! can be used for v3 and 4 later on
            }));

            const nextNum = records.length + 1;

            switch (mode)
            {
              case "append":
                records.push(
                {
                  recordType: "text",
                  data: FixedSizeformat(customText || "WebNFC write" + nextNum), //either user input string for writex as data string
                  id: "STRING" + nextNum
                }); //get data onto last block like stack
                break;

              case "LED": //the write logic on micrbit LED data
                records.push(
                  {
                    recordType: "text",
                    data: FixedSizeformat(finalPattern),
                    id: "IMG" + nextNum
                  }
                );
                //log(`adding in LED data...`);
                log(`Adding LED: ${label}`);
                break;
              
              case "overwrite":
                let found = false; //make sure the targetIID on the input can actually be found in the tag
                records = records.map(r =>
                {
                  if (r.id === targetID)
                  {
                    found = true;
                    return {
                      recordType: "text",
                      data: FixedSizeformat(customText || "Overwritten Data"), //overwrites a custom string of default to "xx"
                      id: targetID
                    };
                  }
                  return r;
                });
                if (!found) log("ID not found, adding new instead");
                break;
            }

            await NDEF.write({ records: records}); //update data block
            log(`Successfully write new data: now tag has ${records.length} records.`)
            nfcController.abort(); //stops the code from looping and adding new data block and update it
          }
          catch (writeError)
          {
            log("Update error: " + writeError);
          }
        };
      } catch (error) 
      {
        log("Write Error: " + error);
      }
    };
    <!-- event listener to enable/disable ID target section -->
    document.getElementById('appendButton').onclick = () => 
    {
      document.getElementById('idTargetSection').style.display = 'none';
      NFCWrite("append");
    };
    document.getElementById('overwriteButton').onclick = () => 
    {
      document.getElementById('idTargetSection').style.display = 'block';
      NFCWrite("overwrite");
    };
    document.getElementById('writePresetButton').onclick = () => NFCWrite("LED");

    document.getElementById('writeCustomLED').onclick = () =>
    {
      const userPattern = getGridString();
      NFCWrite("LED", userPattern);
    }
  
    //Reset Funciton: to reset to a specific states for the card
    // Current version - v1: reset to factory (?) states for the card
    // v2: 
    document.getElementById('resetButton').onclick = async () => 
    {
      stopExisitingScan();
      try
      {
        const NDEF = new NDEFReader();

        log("ready to reset.");
        await NDEF.scan({signal: nfcController.signal}); //scan uses the signal instead of write

        NDEF.onreading = async () =>
        {
          try
          {
            await performWipe(NDEF)
            log("Tag has been reset!");
            nfcController.abort();
          }catch (e)
          {
            log("Write Error: " + e); 
          };
        }
      } catch (error)
      {
        log("Reset Error: " + error);
      }
    };

    document.getElementById('writeMenuButton').onclick = () => //function requires for the topdown menu to workm properly
    {
      const submenu = document.getElementById('writeSubmenu');
      if (submenu.style.display === "none") 
      {
        submenu.style.display = "block";
      } else 
      {
        submenu.style.display = "none";
      }
    };

    // Reading Function, responsible for reading data inside the tag for user to use what data they are about to control
    // Current version - v1: Read all data on NFC chip
    //v2 plan: get to read certain data record
    //v3 plan: read specific block of data as input, mode of display
    document.getElementById('scanButton').onclick = async () => //wait for NFC to read the file
    {
      stopExisitingScan();
      try 
      {
        const reader = new NDEFReader(); //Starts NFC hardware
        await reader.scan( {signal: nfcController.signal}); //wait for permission to use NFC
        log("Scan started...");

        reader.onreading = ({ message, serialNumber }) => //wait until NFC device(tag/ card) is scanned
        {
          log(`> Serial Number: ${serialNumber}`); //ID of NFC tag
          const decoder = new TextDecoder(); //NFC data decoder -> convert to text instead of binaries
          for (const record of message.records) //loop the entire NFC tag data until none
          {
            log(`> Record: ${decoder.decode(record.data).trim()} (${record.recordType}) (${record.id})`);  //decode current record's data section, Record.date = info, record.recordtype = label of data
            //Use ${} for better literal writing, need to use ` instead of ""
          }
          nfcController.abort();
        };
      } catch (error) 
      {
        log("Error: " + error);
      }
    };

  </script>
</body>
</html>
