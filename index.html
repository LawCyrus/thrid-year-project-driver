<!DOCTYPE html>
<html>
  <!-- This is a webpage for simple NFC interactions, including read, write, and resetting a NFC tag-->
<head>
  <!-- A seperate CSS section to custoimize the UI of each buttons and the webpage layout-->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <!--make sure webpage can actually fit in different screen size-->
  <title>Web NFC editor</title>
  <style>
    :root /* Reusable global variables for consistent UI design */
    {
      --bg: #f4f6fc;
      --surface: #ffffff;
      --text: #1e2740;
      --logtext: #5b6b86;
      --primary: #2b56a1;
      --accent: #f4a261;
      --border: #d6dfee;
    }

    * 
    {
      box-sizing: border-box; /* make sure the height/width includes padding and border px */
    }

    body /* Overall page UI setting */
    {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif, Roboto, Arial;
      line-height: 1.5;
      min-height: 100vh;
      padding: 24px 12px;
    }

    .container /* set max width for container and make it center aligned*/
    {
      max-width: 1040px;
      margin: 0 auto;
      padding: 20px;
    }

    .menu-group,
    .controls /*UI setting for button groups and top down menu */
    {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(20, 34, 55, 0.08); /*added shadow to container to stop the buttons blending in the webpage*/
      padding: 18px;
      margin-bottom: 20px;
    }

    h1 /* title Ui setting, make title more responsive to various screen size using clamp() */
    {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 900;
    }

    button,select,input /* consistent font across buttons, inputs, and select mode*/
    {
      font: inherit;
    }

    button /*UI setting for the individual buttons*/
    {
      background: var(--primary);
      color: #fff;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0.55rem 0.95rem;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease;
      margin: 0 0.35rem 0.35rem 0;
    }

    button:hover /* change the button UI to the following setting when mouse hover over the butotn*/
    {
      transform: translateY(-1px);
      background: #1f4f8a;
    }

    #log /* log section UI setting*/
    {
      white-space: pre-wrap;
      font-family: ui-monospace, monospace;
      color: var(--logtext);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      min-height: 92px;
      background: #fdfdff;
      margin-top: 10px;
    }

    #ledGrid 
    {
      display: grid;
      grid-template-columns: repeat(5, 30px);
      gap: 5px;
      margin-bottom: 10px;
    }

    #ledGrid > div 
    {
      width: 30px;
      height: 30px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    label,
    p,
    select,
    input 
    {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!--here is where the top down menu will be located at. The top down menu allows user to select what operation they are about to be, then using the r/w
    button to confirm what they are doing -->

    <!-- needs it to make sure white space padding is showing properly-->
    <h1>Web NFC editor</h1>
    <div class="controls">
      <button id="scanButton">Scan Card</button>
      <button id="writeButton">Write Card</button>
      <button id="resetButton">Reset Card</button>
    </div>

    <p id="log"></p>

    <div class="menu-group">
    <button id="writeMenuButton">Write Options ▾</button>
    <div id="writeSubmenu" style="display: none; border: 1px solid hsl(0, 0%, 80%); padding: 10px; margin-top: 5px; background: #f9f9f9;">

      <!-- Mode selection on write functions-->
      <p><strong>Select Mode:</strong></p>
      <button id="appendButton">Add New Record</button>
      <button id="overwriteButton">Overwrite by ID</button>
      <br><br>
      <div id="idTargetSection" style="display: none;">
        <label>ID to Target:</label>
        <input type="text" id="targetID" value="DATA1">
      </div>

      <!-- Area for user to input their own string-->
      <p><strong>Custom Input:</strong></p>
      <input type="text" id="userInput" placeholder="Enter text here:">
      <br><br>

      <!-- Area for user to add in LED image of their choice-->
       <hr>
       <p><strong>Custom LED Grid:</strong></p>
       <div id="ledGrid" style="display: grid; grid-template-columns: repeat(5, 30px); gap: 5px; margin-bottom:10px;">
       </div>
       <button id="writeCustomLED">Write LED Image</button>


      <!--a microbit led preset to test the microbit LED interactions-->
      <hr>
      <p><strong>micro:bit LED Presets:</strong></p>
      <select id = "presetList">
        <option value = "0101011111111110111000100">Heart</option>
        <option value="1111110001100011000111111">Square</option>
        <option value="0000001010000001000101110">Smile</option>
      </select>
      <button id="writePresetButton">Preset Append</button>
    </div>

    <!-- <button id="readMenuButton">Read Options ▾</button>
    <button id="resetMenuButton">Reset Options ▾</button> -->
    <!-- The read and reset options are not implemented yet, but the buttons are there for future development. -->

<script>
    const FIXED_BLOCK_SIZE = 25; // uniform block size for each data block, also the byte limit for user input
    let nfcController = null; //global controller to ensure only 1 operation is running at the same time
    const textEncoder = new TextEncoder();
    const userInput = document.getElementById('userInput'); 
    const MAX_LOG_SIZE = 10; // limit log to last 10 message to prevent log overflow
    let logMessages = []; 

    // core function to calculate the byte lenght of input string
    function byteLength(text)
    {
      return textEncoder.encode(text).length;
    }

    // trim the user input to within byte limit when they paste long strings in
    function trimBytes(text, maxBytes)
    {
      let result = "";
      for (const ch of text)
      {
        const test = result + ch;
        if (byteLength(test) > maxBytes) break;
        result = test;
      }
      return result;
    }

    // stop current NFC operation and reset the controller
    function stopCurrentOperation()
    {
      if (nfcController)
      {
        nfcController.abort();
        nfcController = null;
      }
    }

    // function clearLog() function to be implemented if want to clear log every time before new operation, but currently prefer to keep the log for user to see the history operations and data, so I commented out this function and its call in the code
    // {
    //   logMessages = [];
    //   document.getElementById('log').innerText = "";
    // }

    // reusable log function replacing old single log message
    function log(msg) 
    {
      logMessages.push(msg);

      if (logMessages.length > MAX_LOG_SIZE)
      {
        logMessages = logMessages.slice(-MAX_LOG_SIZE);
      }

      document.getElementById('log').innerText = logMessages.join("\n");
    }

    // creates a 5x5 Grid UI for user to input
    const gridContainer = document.getElementById('ledGrid'); 
    for (let i =0; i < 25; i++)
    {
      const led = document.createElement('div');
      led.style.width = '30px';
      led.style.height = '30px';
      led.style.border = '1px solid #ccc';
      led.style.backgroundColor = '#fff';
      led.style.cursor = 'pointer';
      led.dataset.state = "0";

      led.onclick = () => //wait until click, then setup the code
      {
        if (led.dataset.state === "0") //if the current clicked led is not set to on
        {
          led.style.backgroundColor = 'red';
          led.dataset.state = "1";
        }else //set that led to 0(off)
        {
          led.style.backgroundColor = '#fff';
          led.dataset.state = "0";
        }
      };
      gridContainer.appendChild(led);
    }

    // converts the current grid pattern to 25 strings of 0s and 1s
    function getGridString()
    {
      return Array.from(gridContainer.children).map(led => led.dataset.state).join('');
    }

    //function to ensure all functions is killed before new function is running
    function beginOperation() 
    {
      stopCurrentOperation();
      nfcController = new AbortController()
    }

    // trim by bytes instead of character
    function FixedSizeformat(text) 
    {
      const trimmed = trimBytes(text, FIXED_BLOCK_SIZE);
      return trimmed.padEnd(FIXED_BLOCK_SIZE, " ");
    }

    // getting the number of the reset block id
    function getResetNumber(id)
    {
      const match = /^RESET(\d+)$/i.exec((id || "").trim());
      return match ? Number(match[1]) : null;
    }

    // resets the tag by overwrite existing data with empty string
    async function resetTag()
    {
      beginOperation();

      try
      {
        const ndef = new NDEFReader();

        log("Ready to reset. Please tap the tag.");
        await ndef.scan({ signal: nfcController.signal });

        // wait for the tag to be scanned, then overwrite all text records with empty string
        ndef.onreading = async ({ message }) =>
        {
          ndef.onreading = null;

          try
          {
            let oldCount = 0;

            for (const record of message.records)
            {
              if (record.recordType === "text")
              {
                oldCount += 1;
              }
            }

            if (oldCount < 1) oldCount = 1;

            let resetRecords = [
              {
                recordType: "text",
                data: FixedSizeformat(""),
                id: "RESET1"
              }
            ];

            for (let i = 2; i <= oldCount; i++)
            {
              resetRecords.push({
                recordType: "text",
                data: FixedSizeformat(""),
                id: "RESET" + i
              });
            }

            await ndef.write(
              { records: resetRecords },
              { overwrite: true }
            );

            log(`Successfully reset tag. ${oldCount} slot(s) prepared.`);
          }
          catch (error)
          {
            log("Reset Error: " + error);
          }
          finally
          {
            stopCurrentOperation();
          }
        };
      }
      catch (error)
      {
        log("Reset Error: " + error);
        stopCurrentOperation();
      }
    }


    // Writing Function, responsible for writing string/ image data inside the tag
    async function NFCWrite(mode, customPattern = null) //customPattern = null to make the custompattern parameter optional
    {
      beginOperation();

      const targetID = document.getElementById('targetID').value.trim().toUpperCase(); //prevent casing error when user input in lowercase
      const customText = trimBytes(document.getElementById('userInput').value, FIXED_BLOCK_SIZE);

      const select = document.getElementById('presetList');
      const gridPattern = getGridString();
      const finalPattern = customPattern !== null ? customPattern : gridPattern;

      try 
      {
        const NDEF = new NDEFReader(); 

        log (`Mode: ${mode}, Ready to write. Please tap the tag`);
        await NDEF.scan({signal: nfcController.signal});

        // wait for tag to be scanned, then read existing data inside the tag and decide how to write new data based on the selected mode
        NDEF.onreading = async ({message}) => 
        {

          try
          {
            NDEF.onreading = null; 

            let records = [];

            for (const record of message.records) 
            {
              if (record.recordType === "empty") continue;
              if (record.recordType !== "text") continue; //only read in text data

              let textValue = "";
              try 
              {
                textValue = new TextDecoder(record.encoding || "utf-8").decode(record.data);
              } catch (e) 
              {
                textValue = "";
              }

              records.push(
              {
                recordType: "text",
                data: textValue,
                id: record.id || ""
              });
            }

            const nextNum = records.length + 1;

            // decide how to write new data based on the selected mode
            switch (mode)
            {
              case "append":
              {
                let reused = false;
                records = records.map(r =>
                {
                  const resetNum = getResetNumber(r.id);
                  if (!reused && resetNum !== null)
                  {
                    reused = true;
                    return {
                      recordType: "text",
                      data: FixedSizeformat(customText || "String No." + resetNum), 
                      id: "SDATA" + resetNum
                    };
                  }
                  return r;
                });

                if (!reused)
                {
                  records.push(
                  {
                    recordType: "text",
                    data: FixedSizeformat(customText || "Default string No." + nextNum), //either user input string for writex as data string
                    id: "SDATA" + nextNum
                  }); //get data onto last block like stack
                }
                break;
              }

              case "LED": //the write logic on micrbit LED data
              {
                let reused = false;

                records = records.map(r =>
                {
                  const resetNum = getResetNumber(r.id);
                  if (!reused && resetNum !== null)
                  {
                    reused = true;
                    return {
                      recordType: "text",
                      data: FixedSizeformat(finalPattern),
                      id: "IDATA" + resetNum
                    };
                  }
                  return r;
                });

                if (!reused)
                {
                  records.push(
                    {
                      recordType: "text",
                      data: FixedSizeformat(finalPattern),
                      id: "IDATA" + nextNum
                    }
                  );
                }
                
                //log(`adding in LED data...`);
                log(`Adding LED: image`);
                break;
              }

              case "overwrite":
              {
                let found = false; //make sure the targetIID on the input can actually be found in the tag
                
                records = records.map(r =>
                {
                  const currentId = (r.id || "").toUpperCase();
                  if (currentId === targetID)
                  {
                    found = true;
                    const resetNum = getResetNumber(currentId);

                    if (currentId.indexOf("IDATA") === 0)
                    {
                      return {
                        recordType: "text",
                        data: FixedSizeformat(finalPattern),
                        id: resetNum !== null ? ("IDATA" + resetNum) : targetID
                      };
                    }
                    else
                    {
                      return {
                        recordType: "text",
                        data: FixedSizeformat(customText || "Overwritten Data"),
                        id: resetNum !== null ? ("SDATA" + resetNum) : targetID
                      };
                    }
                  }
                  return r;
                });

                if (!found) 
                {
                  log("ID not found, please type an existing ID");
                }
                break;
              }
            }

            await NDEF.write({ records}, {overwrite: true}); //update data block
            log(`Successfully write new data: now tag has ${records.length} records.`)
          }
          catch (writeError)
          {
            log("Update error: " + writeError);
          }
          finally
          {
            stopCurrentOperation();
          }
        };
      } catch (error) 
      {
        log("Write Error: " + error);
        stopCurrentOperation();
      }
    };
    // event listener for the write buttons, each button will trigger the same write function but with different mode, and the write function will decide how to write data based on the mode
    document.getElementById('appendButton').onclick = () => 
    {
      document.getElementById('idTargetSection').style.display = 'none';
      NFCWrite("append");
    };
    document.getElementById('overwriteButton').onclick = () => 
    {
      document.getElementById('idTargetSection').style.display = 'block';
      NFCWrite("overwrite");
    };
    document.getElementById('writePresetButton').onclick = () => 
    {
      const preset = document.getElementById('presetList').value;
      NFCWrite("LED", preset);
    };

    document.getElementById('writeCustomLED').onclick = () =>
    {
      const userPattern = getGridString();
      NFCWrite("LED", userPattern);
    }

    // check byte length of user input in real time
    userInput.addEventListener('beforeinput', (e) =>
    {
      if (!e.data || e.inputType.startsWith('delete')) return;

      const start = userInput.selectionStart ?? userInput.value.length;
      const end = userInput.selectionEnd ?? userInput.value.length;

      const nextValue = userInput.value.slice(0, start) + e.data + userInput.value.slice(end);
      if (byteLength(nextValue) > FIXED_BLOCK_SIZE)
      {
        e.preventDefault();
      }
    });

    // trim text that is input in a single action (i.e pasting text) to 25 bytes
    userInput.addEventListener('input', () =>
    {
      const trimmed = trimBytes(userInput.value, FIXED_BLOCK_SIZE);
      if (userInput.value !== trimmed)
      {
        userInput.value = trimmed;
      }
    });
  
    //Reset Funciton: Reset the tag to a specific states for the card
    document.getElementById('resetButton').onclick = resetTag;
    

    document.getElementById('writeMenuButton').onclick = () => //function requires for the topdown menu to workm properly
    {
      const submenu = document.getElementById('writeSubmenu');
      if (submenu.style.display === "none") 
      {
        submenu.style.display = "block";
      } else 
      {
        submenu.style.display = "none";
      }
    };

    // Reading Function, responsible for reading data inside the tag for user to use
    document.getElementById('scanButton').onclick = async () => //wait for NFC to read the file
    {
      beginOperation();

      try 
      {
        const reader = new NDEFReader(); //Starts NFC hardware

        await reader.scan( {signal: nfcController.signal}); //wait for permission to use NFC
        log("Scan started. Please tap the tag");

        reader.onreading = ({ message, serialNumber }) => //wait until NFC device(tag/ card) is scanned
        {

          reader.onreading = null; 

          log(`> Serial Number: ${serialNumber}`); 
          const decoder = new TextDecoder(); 
          for (const record of message.records) //loop the entire NFC tag data until none
          {
            let dataText = "";

            if (record.recordType === "text") //if the data is text, decode it and display in log
            {
              dataText = decoder.decode(record.data);
            }else
            {
              //if the data is not text, display the type of data in log instead of the actual data
              dataText = `[${record.recordType} data]`; 
            }

            log(`> Record: ${dataText.trim()} (${record.recordType}) (${record.id|| ""} )`);  
          }
          stopCurrentOperation(); 
        };
      } catch (error) 
      {
        log("Error: " + error);
      }
    };

  </script>
</body>
</html>
